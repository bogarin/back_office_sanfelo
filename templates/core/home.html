{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #9d2638 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            color: white;
            max-width: 600px;
            padding: 48px 40px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 16px;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p {
            margin-bottom: 32px;
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 48px;
            background: #1e3a8a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1e40af;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.4);
        }

        .btn:focus {
            outline: 2px solid #f59e0b;
            outline-offset: 2px;
        }

        .logo-icon {
            margin-bottom: 24px;
            width: 120px;
            height: 120px;
            object-fit: contain;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 640px) {
            .logo-icon {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin: 20px;
                padding: 32px 24px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .btn {
                padding: 12px 32px;
                font-size: 0.9375rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{% static 'sf_logo.jpg' %}" alt="Logo de San Felipe" class="logo-icon">
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>
        <a href="{% url 'admin:index' %}" class="btn" aria-label="Ingresar al sistema de administración">
            Ingresar al Sistema
        </a>
    </div>
</body>
</html>
