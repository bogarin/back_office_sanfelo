version: '3.8'

services:
  # PostgreSQL Database for Backoffice Application
  postgres:
    image: postgres:16-alpine
    container_name: backoffice_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backoffice_tramites}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backoffice_network

  # Keycloak - Identity and Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: backoffice_keycloak
    environment:
      # Keycloak admin credentials
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      
      # Database configuration (PostgreSQL)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_password}
      
      # Hostname configuration
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8080}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-false}
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-false}
      
      # HTTP configuration
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED:-true}
      KC_HTTP_PORT: ${KEYCLOAK_PORT:-8080}
      
      # Proxy configuration (uncomment if behind reverse proxy)
      # KC_PROXY: ${KC_PROXY:-edge}
      
      # Production mode
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED:-true}
      KC_METRICS_ENABLED: ${KC_METRICS_ENABLED:-true}
      
    command: start-dev
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - backoffice_network
    restart: unless-stopped

  # PostgreSQL Database for Keycloak
  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak_postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_password}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backoffice_network
    restart: unless-stopped

  # Backoffice Application
  backoffice:
    build:
      context: .
      dockerfile: Dockerfile
    image: backoffice-tramites:latest
    container_name: backoffice_app
    environment:
      # Database configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-backoffice_tramites}
      
      # Server configuration
      HTTP_PORT: ${HTTP_PORT:-8090}
      
      # Django configuration
      DJANGO_SETTINGS_MODULE: sanfelipe.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      
      # Allowed hosts (comma-separated)
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # Static and media files
      STATIC_ROOT: /app/staticfiles
      MEDIA_ROOT: /app/media
      
      # Keycloak configuration for authentication
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-backoffice}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-backoffice-client}
      KEYCLOAK_CLIENT_SECRET_KEY: ${KEYCLOAK_CLIENT_SECRET_KEY}
      
      # Email configuration (optional)
      # EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      # EMAIL_HOST: ${EMAIL_HOST}
      # EMAIL_PORT: ${EMAIL_PORT:-587}
      # EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      # EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      # EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      # DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      
      # Redis configuration (optional, for caching)
      # REDIS_URL: redis://redis:6379/1
      
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "${HTTP_PORT:-8090}:${HTTP_PORT:-8090}"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT:-8090}/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backoffice_network
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_postgres_data:
  media_files:
  static_files:

networks:
  backoffice_network:
    name: backoffice_network
    driver: bridge
