version: '3.8'

services:
  # PostgreSQL Database for Backoffice Application
  postgres:
    image: postgres:16-alpine
    container_name: backoffice_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backoffice_tramites}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backoffice_network

  # Backoffice Application
  backoffice:
    build:
      context: .
      dockerfile: Dockerfile
    image: backoffice-tramites:latest
    container_name: backoffice_app
    environment:
      # ============================================================
      # Database Configuration
      # ============================================================
      # SQLite database path (inside container) - For Django auth, admin, sessions
      DJANGO_SQLITE_DB_PATH: /app/db.sqlite3

      # PostgreSQL database for legacy business data (tramites, catalogos, costos, bitacora)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-backoffice_tramites}

      # ============================================================
      # Django Core Configuration
      # ============================================================
      DJANGO_SETTINGS_MODULE: sanfelipe.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      TESTING: ${TESTING:-False}

      # ============================================================
      # Debug & Development
      # ============================================================
      # Internal IPs for Django Debug Toolbar (only used when DEBUG=True)
      DJANGO_INTERNAL_IPS: ${DJANGO_INTERNAL_IPS:-127.0.0.1,0.0.0.0}
      # Enable SQL query logging to console
      DJANGO_DEBUG_SQL: ${DJANGO_DEBUG_SQL:-False}
      # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}

      # ============================================================
      # Security Settings (Production)
      # ============================================================
      # Security headers (only used when DEBUG=False)
      DJANGO_SECURE_CONTENT_TYPE_NOSNIFF: ${DJANGO_SECURE_CONTENT_TYPE_NOSNIFF:-True}
      DJANGO_SECURE_BROWSER_XSS_FILTER: ${DJANGO_SECURE_BROWSER_XSS_FILTER:-True}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-False}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-False}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-False}

      # ============================================================
      # CSRF Configuration
      # ============================================================
      # Trusted origins for CSRF (comma-separated, no protocol)
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}

      # ============================================================
      # Session Configuration
      # ============================================================
      # Session cookie age in seconds (3600 = 1 hour)
      DJANGO_SESSION_COOKIE_AGE: ${DJANGO_SESSION_COOKIE_AGE:-3600}

      # ============================================================
      # Pagination Configuration
      # ============================================================
      # Default page size for list views
      DJANGO_DEFAULT_PAGE_SIZE: ${DJANGO_DEFAULT_PAGE_SIZE:-25}

      # ============================================================
      # Email Configuration
      # ============================================================
      # Email backend: console (development) or smtp (production)
      DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DJANGO_EMAIL_HOST: ${DJANGO_EMAIL_HOST:-localhost}
      DJANGO_EMAIL_PORT: ${DJANGO_EMAIL_PORT:-587}
      DJANGO_EMAIL_USE_TLS: ${DJANGO_EMAIL_USE_TLS:-True}
      DJANGO_EMAIL_HOST_USER: ${DJANGO_EMAIL_HOST_USER:-}
      DJANGO_EMAIL_HOST_PASSWORD: ${DJANGO_EMAIL_HOST_PASSWORD:-}
      DJANGO_DEFAULT_FROM_EMAIL: ${DJANGO_DEFAULT_FROM_EMAIL:-noreply@sanfelipe.gob.ar}

      # ============================================================
      # Static & Media Files
      # ============================================================
      STATIC_ROOT: /app/staticfiles
      MEDIA_ROOT: /app/media

    volumes:
      - django_db:/app/db
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "${HTTP_PORT:-8090}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backoffice_network
    restart: unless-stopped

volumes:
  postgres_data:
  django_db:
  media_files:
  static_files:

networks:
  backoffice_network:
    name: backoffice_network
    driver: bridge
