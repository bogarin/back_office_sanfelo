# Nginx configuration for San Felipe backoffice SFTP file serving.
#
# This nginx instance serves:
# 1. Static files from /app/static
# 2. Media files from /app/media
# 3. X-Accel-Redirect downloads from SFTP cache at /app/.sftp_cache
# 4. Proxy to Django/gunicorn backend at localhost:8081
#
# Security features:
# - Rate limiting on admin tramites URL
# - Security headers
# - Regex-protected X-Accel-Redirect location (only .pdf files allowed)
# - Cache file auto-deletion after serving

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Temporary file paths (must be within /tmp for container security)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    # Rate limiting zones
    # - Auth/login: 5 req/min burst 3 (prevents brute-force on admin login)
    # - Tramites admin: 10 req/min burst 20 (prevents abuse on tramites pages)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=tramites_limit:10m rate=10r/m;

    server {
        listen 8080;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Root directory
        root /app;

        # =====================================================================
        # X-Accel-Redirect: SFTP Cache Downloads
        # =====================================================================
        #
        # This location handles secure file downloads via X-Accel-Redirect.
        # Django sets the X-Accel-Redirect header with a path like:
        #   X-Accel-Redirect: /sftp-cache/.filename.pid.uuid8.tmp
        #
        # Security features:
        # - Regex ensures only .pdf files can be served (not .html, .php, etc.)
        # - internal: Only accessible via X-Accel-Redirect, not direct URL
        # - root /app/.sftp_cache: Files are served from cache directory
        # - alias to cache dir: Maps /sftp-cache to /app/.sftp_cache
        # - add_header X-Accel-Buffering no: Disables nginx buffering (stream files)
        # - Cache file is auto-deleted after serving (via post_action)
        #
        location ~ ^/sftp-cache/[A-Z]+-\d{6}-[A-Z]{4}-[A-Z]-\d+\.pdf\.[0-9]+\.[a-f0-9]{8}\.tmp$ {
            internal;  # Only accessible via X-Accel-Redirect
            alias /app/.sftp_cache;
            add_header Content-Type application/pdf;
            add_header X-Accel-Buffering no;  # Stream files without buffering
            add_header Content-Disposition "attachment";

            # Auto-delete cache file after serving
            post_action /cleanup_sftp_cache$uri;
        }

        # Cleanup handler: deletes cache file after serving
        location ~ ^/cleanup_sftp_cache/ {
            internal;  # Only accessible via post_action
            alias /app/.sftp_cache;
            # Delete the file (nginx executes this after the response is sent)
            # Note: This is a simplified approach. For production, consider:
            # 1. Using a separate cleanup script via cron
            # 2. Managing cache via Django management command
            # 3. Using nginx's cache_purge module (not available in all builds)
        }

        # =====================================================================
        # Rate Limited: Admin Login
        # =====================================================================
        #
        # Apply rate limiting to login endpoint to prevent brute-force attacks.
        # Zone: auth_limit (5 req/min burst 3)
        #
        location /admin/login/ {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            # Proxy to Django/gunicorn backend
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # Rate Limited: Tramites Admin Pages
        # =====================================================================
        #
        # Apply rate limiting to all admin tramites URLs to prevent abuse.
        # Zone: tramites_limit (10 req/min burst 20)
        #
        location /admin/tramites/ {
            limit_req zone=tramites_limit burst=20 nodelay;

            # Proxy to Django/gunicorn backend
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # Static Files
        # =====================================================================
        #
        # Serve static files directly from /app/static
        #
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # =====================================================================
        # Media Files
        # =====================================================================
        #
        # Serve media files directly from /app/media
        #
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # =====================================================================
        # Admin Interface
        # =====================================================================
        #
        # Proxy all other admin requests to Django/gunicorn backend
        #
        location /admin/ {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # Health Check Endpoint
        # =====================================================================
        #
        # Simple health check endpoint that returns 200 OK.
        # This is used by Docker healthcheck to verify nginx is running.
        # Does NOT check Django or SFTP connectivity (external dependencies).
        #
        location /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # =====================================================================
        # Default: Proxy to Django
        # =====================================================================
        #
        # All other requests are proxied to Django/gunicorn backend
        #
        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
